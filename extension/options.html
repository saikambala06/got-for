<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SK VK — Settings</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#0f1115; color:#f1f2f4; padding:24px; max-width:420px; }
  h2 { font-size:16px; margin:0 0 4px; }
  p { font-size:12px; color:#9b9fab; margin:0 0 16px; }
  label { font-size:11px; color:#9b9fab; text-transform:uppercase; letter-spacing:.03em; }
  input { width:100%; padding:9px 10px; border-radius:8px; border:1px solid #2b2f3a; background:#181b22; color:#f1f2f4; font-size:13px; margin-top:6px; }
  button { margin-top:12px; padding:9px 14px; border-radius:8px; border:none; background:#4f46e5; color:#fff; font-weight:600; font-size:13px; cursor:pointer; }
  .status { font-size:12px; color:#34d399; margin-top:8px; min-height:14px; }
</style>
</head>
<body>
  <h2>SK VK extension settings</h2>
  <p>Set the URL where your SK VK dashboard is deployed.</p>
  <label for="url">Dashboard URL</label>
  <input id="url" type="text" placeholder="https://your-app.vercel.app" />
  <button id="saveBtn">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
