<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SK VK</title>
<style>
  * { box-sizing: border-box; }
  body {
    width: 300px;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115;
    color: #f1f2f4;
  }
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid #23262e;
  }
  .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: #4f46e5; color: #fff; font-weight: 700; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .header .title { font-weight: 600; font-size: 14px; }
  .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 11px; color: #9b9fab; text-transform: uppercase; letter-spacing: .03em; }
  input {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid #2b2f3a; background: #181b22; color: #f1f2f4; font-size: 13px;
  }
  input:focus { outline: none; border-color: #4f46e5; }
  button {
    margin-top: 4px; padding: 9px 12px; border-radius: 8px; border: none;
    background: #4f46e5; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #4338ca; }
  button.secondary {
    background: transparent; border: 1px solid #2b2f3a; color: #d3d5db;
  }
  button.secondary:hover { background: #181b22; }
  .status { font-size: 12px; color: #34d399; min-height: 14px; }
  .saved-count { font-size: 11px; color: #9b9fab; }
</style>
</head>
<body>
  <div class="header">
    <div class="mark">SK</div>
    <div class="title">SK VK — Save this job</div>
  </div>
  <div class="body">
    <div>
      <label for="jobTitle">Job title</label>
      <input id="jobTitle" type="text" placeholder="e.g. Frontend Engineer" />
    </div>
    <div>
      <label for="company">Company</label>
      <input id="company" type="text" placeholder="e.g. Acme Inc." />
    </div>
    <div>
      <label for="jobUrl">Posting URL</label>
      <input id="jobUrl" type="text" />
    </div>
    <button id="saveBtn">Save job</button>
    <button id="openBtn" class="secondary">Open SK VK Tracker</button>
    <div class="status" id="status"></div>
    <div class="saved-count" id="savedCount"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
