<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SKVK Assistant</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="dot"></span> SKVK Assistant</div>

    <div id="login-view" class="view">
      <p class="hint">Log in with your SKVK account to parse jobs, match your resume, and tailor it in one click.</p>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <button id="loginBtn" class="primary">Log in</button>
      <div id="loginError" class="error"></div>
    </div>

    <div id="app-view" class="view" style="display:none;">
      <div class="userRow">
        <div class="avatar" id="avatar">N</div>
        <div>
          <div class="userName" id="userName">—</div>
          <div class="userEmail" id="userEmail">—</div>
        </div>
      </div>
      <button id="showPanelBtn" class="primary">Show panel on this page</button>
      <p class="hint small">Works on any job posting page — LinkedIn, Indeed, Greenhouse, Lever, Jobright, or a company's own careers site.</p>
      <button id="dashboardBtn" class="ghost">Open SKVK dashboard</button>
      <button id="logoutBtn" class="ghost">Log out</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
