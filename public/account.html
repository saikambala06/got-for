<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetMeApply - Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <div class="app-layout" id="app">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="topbar-container"></div>
      <div class="page-content">
        <h1 class="page-title">Account</h1>
        <p class="page-subtitle">Manage your account settings</p>

        <div class="account-layout">
          <div class="account-nav-panel">
            <button class="account-nav-item active" id="nav-profile" onclick="switchTab('profile')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Profile
            </button>
            <button class="account-nav-item" id="nav-security" onclick="switchTab('security')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Security
            </button>
            <button class="account-nav-item" id="nav-billing" onclick="switchTab('billing')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
              Billing
            </button>
          </div>

          <div class="account-content-panel" id="account-content"></div>

          <div class="account-side-panel" id="account-side"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/common.js"></script>
  <script>
    if (!checkAuth()) throw new Error('Not authenticated');

    document.getElementById('sidebar-container').innerHTML = getSidebarHTML('account');
    document.getElementById('topbar-container').innerHTML = getTopbarHTML();
    loadPlanInfo();

    let currentUser = null;
    let activeTab = 'profile';

    async function loadUser() {
      try {
        const data = await apiCall('/account/profile');
        if (data) {
          currentUser = data.user;
          renderContent();
          renderSide();
        }
      } catch (err) {
        showToast('Failed to load profile', 'error');
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.account-nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`nav-${tab}`).classList.add('active');
      renderContent();
    }

    function renderContent() {
      const content = document.getElementById('account-content');

      if (activeTab === 'profile') {
        content.innerHTML = `
          <div class="account-content-header">
            <h3 style="font-size:18px; font-weight:700;">Profile</h3>
          </div>
          <div class="account-content-body">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-input" id="profile-name" value="${currentUser.name || ''}">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="profile-email" value="${currentUser.email || ''}" disabled style="opacity:0.6; cursor:not-allowed;">
              <small style="color:var(--text-muted); font-size:12px; margin-top:4px; display:block;">Email cannot be changed</small>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()" style="margin-top:8px;">Save Changes</button>
          </div>
        `;
      } else if (activeTab === 'security') {
        content.innerHTML = `
          <div class="account-content-header">
            <h3 style="font-size:18px; font-weight:700;">Security</h3>
          </div>
          <div class="account-content-body">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-input" id="current-password" placeholder="Enter current password">
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-input" id="new-password" placeholder="Enter new password" minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-input" id="confirm-password" placeholder="Re-enter new password" minlength="6">
            </div>
            <button class="btn btn-primary" onclick="changePassword()" style="margin-top:8px;">Update Password</button>
          </div>
        `;
      } else if (activeTab === 'billing') {
        content.innerHTML = `
          <div class="account-content-header">
            <h3 style="font-size:18px; font-weight:700;">Billing</h3>
          </div>
          <div class="account-content-body">
            <div style="background:var(--bg-tertiary); border-radius:12px; padding:20px; margin-bottom:20px;">
              <div style="font-size:15px; font-weight:700; margin-bottom:4px;">Current Plan: ${currentUser.plan === 'pro' ? 'Pro' : 'Free'}</div>
              <div style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">
                ${currentUser.plan === 'pro' ? 'You have access to all features.' : 'Upgrade to unlock unlimited job extractions and tailored resumes.'}
              </div>
              ${currentUser.plan === 'free' ? '<button class="btn btn-primary" onclick="showToast(\'Upgrade coming soon\')">Upgrade to Pro</button>' : ''}
            </div>
            <div>
              <div style="font-size:15px; font-weight:600; margin-bottom:12px;">Usage</div>
              <div class="plan-stat" style="margin-bottom:4px;"><span>Job Extractions</span><span>${currentUser.jobExtractions || 0} / ${currentUser.jobExtractionsLimit || 6}</span></div>
              <div class="plan-bar" style="margin-bottom:16px;"><div class="plan-bar-fill" style="width: ${((currentUser.jobExtractions || 0) / (currentUser.jobExtractionsLimit || 6)) * 100}%"></div></div>
              <div class="plan-stat" style="margin-bottom:4px;"><span>Tailored Resumes</span><span>${currentUser.tailoredResumes || 0} / ${currentUser.tailoredResumesLimit || 2}</span></div>
              <div class="plan-bar"><div class="plan-bar-fill" style="width: ${((currentUser.tailoredResumes || 0) / (currentUser.tailoredResumesLimit || 2)) * 100}%"></div></div>
            </div>
          </div>
        `;
      }
    }

    function renderSide() {
      const side = document.getElementById('account-side');
      const connected = currentUser.connectedAccounts || [];
      side.innerHTML = `
        <div class="avatar">${getInitials(currentUser.name)}</div>
        <div class="account-name">${currentUser.name}</div>
        <div class="account-email">${currentUser.email}</div>
        <div style="font-size:13px; font-weight:600; color:var(--text-secondary); text-align:left; margin-top:20px; margin-bottom:8px;">Connected Accounts</div>
        ${connected.length > 0 ? connected.map(a => `
          <div class="connected-account">
            <div class="connected-icon">${a.provider === 'google' ? 'G' : '?'}</div>
            <div class="connected-info">
              <div class="connected-provider">${a.provider}</div>
              <div class="connected-email">${a.email}</div>
            </div>
          </div>
        `).join('') : `
          <div class="connected-account">
            <div class="connected-icon">G</div>
            <div class="connected-info">
              <div class="connected-provider">Google</div>
              <div class="connected-email">Not connected</div>
            </div>
          </div>
        `}
      `;
    }

    async function saveProfile() {
      const name = document.getElementById('profile-name').value.trim();
      try {
        const data = await apiCall('/account/profile', {
          method: 'PUT',
          body: JSON.stringify({ name })
        });
        if (data) {
          currentUser = data.user;
          setUser({ ...getUser(), name: data.user.name });
          renderSide();
          showToast('Profile updated');
        }
      } catch (err) {
        showToast('Failed to update profile', 'error');
      }
    }

    async function changePassword() {
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!currentPassword || !newPassword) {
        showToast('Please fill in all fields', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }
      if (newPassword.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }

      try {
        await apiCall('/account/security', {
          method: 'PUT',
          body: JSON.stringify({ currentPassword, newPassword })
        });
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        showToast('Password updated');
      } catch (err) {
        showToast(err.message || 'Failed to update password', 'error');
      }
    }

    loadUser();
  </script>
</body>
</html>
