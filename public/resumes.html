<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resumes — SK VK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css" />
<style>
  .rt-tabs{ display:flex; gap:6px; margin-bottom:22px; border-bottom:1px solid var(--border); }
  .rt-tab{
    padding:11px 18px; font-size:13.5px; font-weight:600; color:var(--text-faint);
    border:none; background:none; cursor:pointer; border-bottom:2px solid transparent;
    position:relative; top:1px; font-family:var(--font-body);
  }
  .rt-tab.active{ color:var(--accent-2); border-bottom-color:var(--accent); }
  .rt-panel{ display:none; }
  .rt-panel.active{ display:block; }

  .rt-textarea{
    width:100%; min-height:170px; border-radius:var(--radius-sm); border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); padding:16px; font-size:13px; line-height:1.65;
    font-family:'JetBrains Mono', monospace; resize:vertical;
  }
  .rt-textarea:focus{ outline:none; border-color:var(--accent); }

  .rt-actions{ display:flex; align-items:center; gap:12px; margin-top:16px; }
  .rt-hint{ font-size:12.5px; color:var(--text-faint); margin-bottom:14px; }
  .rt-error{
    margin-top:16px; padding:13px 16px; border-radius:var(--radius-sm);
    background:rgba(255,107,129,0.1); border:1px solid rgba(255,107,129,0.3); color:#ffd2da; font-size:13px;
  }

  .loader-sm{
    width:13px; height:13px; border-radius:50%; border:2px solid var(--border);
    border-top-color:var(--accent); display:inline-block; animation:rt-spin .7s linear infinite;
  }
  @keyframes rt-spin{ to{ transform:rotate(360deg); } }

  /* ---------------------------------------------------------------
     Saved-resume detail view — Verascan-style parsed-resume card
     --------------------------------------------------------------- */
  .sr-detail{
    --paper:#EDEFEC; --paper-dim:#E1E4DF; --card:#FFFFFF; --ink:#161B26; --ink-soft:#5A6270;
    --line:#D7DAD3; --gold:#B8862F; --gold-text:#8A6423; --gold-soft:rgba(184,134,47,0.12);
    --teal:#2C6E63; --teal-soft:rgba(44,110,99,0.12); --low:#A8493F;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:30px 34px; margin-top:26px; color:var(--ink); font-family:'IBM Plex Sans',sans-serif;
  }
  .sr-detail .masthead{
    display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;
    padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:4px;
  }
  .sr-detail .out-name{font-family:'Fraunces',serif;font-weight:700;font-size:27px;letter-spacing:-0.01em;}
  .sr-detail .contact-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .sr-detail .chip{
    font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 10px;
    border:1px solid var(--line);border-radius:20px;color:var(--ink-soft);white-space:nowrap;
  }
  .sr-detail .confidence{display:flex;align-items:center;gap:14px;flex:none;}
  .sr-detail .conf-ring-wrap{position:relative;width:82px;height:82px;flex:none;}
  .sr-detail .conf-ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
  .sr-detail .conf-track{fill:none;stroke:var(--paper-dim);stroke-width:9;}
  .sr-detail .conf-fill{fill:none;stroke-width:9;stroke-linecap:round;}
  .sr-detail .conf-center{position:absolute;inset:0;display:flex;align-items:baseline;justify-content:center;font-family:'Fraunces',serif;font-weight:600;}
  .sr-detail .conf-center span{font-size:21px;}
  .sr-detail .conf-center small{font-size:10.5px;margin-left:1px;color:var(--ink-soft);}
  .sr-detail .conf-caption{max-width:150px;}
  .sr-detail .conf-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--gold-text);}
  .sr-detail .conf-missing{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.5;}

  .sr-detail .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-top:18px;overflow-x:auto;scrollbar-width:none;}
  .sr-detail .tabs::-webkit-scrollbar{display:none;}
  .sr-detail .tab-btn{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.03em;text-transform:uppercase;
    background:none;border:none;padding:11px 16px;color:var(--ink-soft);cursor:pointer;
    border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;
  }
  .sr-detail .tab-btn .n{font-size:10px;background:var(--paper-dim);color:var(--ink-soft);border-radius:20px;padding:1px 6px;}
  .sr-detail .tab-btn:hover{color:var(--ink);}
  .sr-detail .tab-btn.active{color:var(--ink);border-bottom-color:var(--gold);}
  .sr-detail .tab-btn.active .n{background:var(--gold);color:#fff;}

  .sr-detail .tab-panels{padding-top:22px;}
  .sr-detail .panel{display:none;animation:sr-fade .22s ease;}
  .sr-detail .panel.active{display:block;}
  @keyframes sr-fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .sr-detail .prose{font-size:14.5px;line-height:1.75;white-space:pre-wrap;margin:0;}
  .sr-detail .empty-note{font-size:13px;color:var(--ink-soft);font-style:italic;padding:18px 0;}

  .sr-detail .skill-cloud{display:flex;flex-wrap:wrap;gap:7px;}
  .sr-detail .skill-pill{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--ink);color:var(--paper);padding:6px 11px;border-radius:3px;}

  .sr-detail .entry-list{display:flex;flex-direction:column;gap:14px;}
  .sr-detail .entry-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:16px 18px;}
  .sr-detail .entry-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .sr-detail .entry-title{font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;}
  .sr-detail .entry-org{font-size:13px;color:var(--teal);margin-top:2px;}
  .sr-detail .entry-meta{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);display:flex;flex-direction:column;gap:2px;white-space:nowrap;}
  .sr-detail .entry-bullets{margin:10px 0 0;padding-left:18px;font-size:13.5px;line-height:1.6;}
  .sr-detail .entry-bullets li{margin-bottom:4px;}

  .sr-detail .cert-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
  .sr-detail .cert-seal{width:24px;height:24px;color:var(--gold);flex:none;margin-top:1px;}
  .sr-detail .cert-body{flex:1;min-width:0;}
  .sr-detail .cert-name{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;}
  .sr-detail .cert-issuer{font-size:12.5px;color:var(--teal);margin-top:2px;}
  .sr-detail .cert-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);white-space:nowrap;flex:none;margin-top:2px;}
  @media (max-width:640px){ .sr-detail{ padding:22px 18px; } }

  /* match gauge */
  .gauge-wrap{ display:flex; align-items:center; gap:26px; padding:20px 0 6px; }
  .gauge{ position:relative; width:104px; height:104px; flex-shrink:0; }
  .gauge svg{ transform:rotate(-90deg); }
  .gauge .num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:26px; font-weight:700; }
  .gauge-label{ font-size:13px; color:var(--text-dim); line-height:1.6; }

  .kw-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .kw-present{ background:rgba(54,211,153,0.12); color:var(--green); }
  .kw-missing{ background:rgba(255,107,129,0.12); color:var(--red); }

  .rt-block{ margin-top:30px; }
  .rt-block h3{
    font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint);
    font-weight:700; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:10px;
  }
  .rt-box{
    background:var(--surface-2); border-radius:var(--radius-sm); padding:16px 18px;
    font-size:13.5px; line-height:1.7; white-space:pre-wrap; color:var(--text);
  }

  .job-pick{
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:13px 16px; margin-bottom:10px; cursor:pointer;
    background:var(--surface-2); transition:.15s ease;
  }
  .job-pick:hover{ border-color:var(--accent); }
  .job-pick .role{ font-weight:700; font-size:13.5px; }
  .job-pick .co{ font-size:12px; color:var(--text-faint); }

  .resume-card{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:10px;
    background:var(--surface-2); cursor:pointer; transition:.15s ease;
  }
  .resume-card:hover{ border-color:var(--accent); }
  .resume-card .rc-title{ font-weight:700; font-size:14px; }
  .resume-card .rc-meta{ font-size:12px; color:var(--text-faint); margin-top:2px; }
  .resume-card .rc-badge{
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-2);
    background:var(--accent-soft); padding:3px 9px; border-radius:100px; margin-left:8px;
  }
  .resume-card .rc-actions{ display:flex; gap:8px; flex-shrink:0; }
  .resume-card .rc-actions button{ position:relative; z-index:2; }

  @media (max-width:820px){ .resume-card{ flex-wrap:wrap; } }
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-root" data-active="resumes"></div>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Resumes</div>
        <div class="page-sub">Resumes you've parsed and saved. Click one to view its details.</div>
      </div>
      <a href="/parse-resume.html" class="btn btn-primary">+ Create a Resume</a>
    </div>

    <div class="card section-card">
      <div id="savedResumesList"></div>
      <div id="savedResumeDetail"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
/* ---- saved resumes ---- */
async function loadSavedResumes() {
  const list = document.getElementById('savedResumesList');
  document.getElementById('savedResumeDetail').innerHTML = '';
  list.innerHTML = '<div class="rt-hint"><span class="loader-sm"></span> Loading your resumes…</div>';
  try {
    const { resumes } = await api.get('/api/resumes');
    if (!resumes.length) {
      list.innerHTML = `<div class="rt-hint">No saved resumes yet. <a href="/parse-resume.html" style="color:var(--accent-2)">Parse a resume</a> to add one.</div>`;
      return;
    }
    list.innerHTML = resumes.map(r => `
      <div class="resume-card" data-view="${r._id}">
        <div>
          <div class="rc-title">${r.title}${r.isDefault ? '<span class="rc-badge">Default</span>' : ''}</div>
          <div class="rc-meta">${(r.skills || []).length} skills · updated ${timeAgo(r.updatedAt)}</div>
        </div>
        <div class="rc-actions">
          <button class="btn" data-view-btn="${r._id}">View</button>
          <button class="btn" data-delete="${r._id}">Delete</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-view], [data-view-btn]').forEach(el => {
      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = el.dataset.view || el.dataset.viewBtn;
        viewSavedResume(id, resumes.find(r => r._id === id));
      });
    });
    list.querySelectorAll('[data-delete]').forEach(el => {
      el.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (!confirm('Delete this resume? This cannot be undone.')) return;
        try {
          await api.del('/api/resumes/' + el.dataset.delete);
          showToast('Resume deleted');
          loadSavedResumes();
        } catch (err) {
          showToast(err.message || 'Could not delete resume', 'error');
        }
      });
    });
  } catch (err) {
    list.innerHTML = `<div class="rt-error">${err.message || 'Could not load resumes'}</div>`;
  }
}

/* ---- saved resume detail — Verascan-style rendering ---- */
const SR_SEAL_SVG = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L21 7 V17 L12 22 L3 17 V7 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 12.5 L11 15.5 L16 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function srEscapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function srEmptyNote(msg) { return `<div class="empty-note">${srEscapeHtml(msg)}</div>`; }

function srDateRange(startDate, endDate, current) {
  if (!startDate && !endDate) return '';
  const end = current ? 'Present' : (endDate || '');
  return end ? `${startDate || ''} – ${end}` : (startDate || '');
}

function srCalcCompletion(resume) {
  const p = resume.personal || {};
  const contactChecks = [p.email, p.phone, p.location, p.linkedin];
  const sectionChecks = [
    !!resume.summary,
    (resume.skills || []).length > 0,
    (resume.experience || []).length > 0,
    (resume.education || []).length > 0,
    (resume.certifications || []).length > 0
  ];
  const contactScore = contactChecks.filter(Boolean).length / contactChecks.length;
  const sectionScore = sectionChecks.filter(Boolean).length / sectionChecks.length;
  const score = Math.round((contactScore * 0.35 + sectionScore * 0.65) * 100);

  const missing = [];
  if (!p.email) missing.push('Email');
  if (!p.phone) missing.push('Phone');
  if (!p.location) missing.push('Location');
  if (!p.linkedin) missing.push('LinkedIn');
  if (!sectionChecks[0]) missing.push('Summary');
  if (!sectionChecks[1]) missing.push('Skills');
  if (!sectionChecks[2]) missing.push('Experience');
  if (!sectionChecks[3]) missing.push('Education');
  if (!sectionChecks[4]) missing.push('Certifications');
  return { score, missing };
}

function srConfidenceRingSVG(score) {
  const r = 52, c = 2 * Math.PI * r;
  const offset = c * (1 - Math.max(0, Math.min(100, score)) / 100);
  let color = 'var(--low)';
  if (score >= 75) color = 'var(--gold)';
  else if (score >= 45) color = 'var(--teal)';
  return `<svg class="conf-ring" viewBox="0 0 120 120">
    <circle class="conf-track" cx="60" cy="60" r="${r}"/>
    <circle class="conf-fill" cx="60" cy="60" r="${r}" style="stroke:${color};stroke-dasharray:${c};stroke-dashoffset:${offset};"/>
  </svg>`;
}

function srRenderSkills(skills) {
  if (!skills || !skills.length) return srEmptyNote('No skills listed.');
  return `<div class="skill-cloud">${skills.map(s => `<span class="skill-pill">${srEscapeHtml(s)}</span>`).join('')}</div>`;
}

function srRenderCertifications(list) {
  if (!list || !list.length) return srEmptyNote('No certifications listed.');
  return `<div class="entry-list">${list.map(c => `
    <div class="cert-card"><div class="cert-seal">${SR_SEAL_SVG}</div><div class="cert-body">
      <div class="cert-name">${srEscapeHtml(c.name || '')}</div>
      ${c.issuer ? `<div class="cert-issuer">${srEscapeHtml(c.issuer)}</div>` : ''}
    </div>${c.date ? `<div class="cert-date">${srEscapeHtml(c.date)}</div>` : ''}</div>`).join('')}</div>`;
}

function srRenderEducation(list) {
  if (!list || !list.length) return srEmptyNote('No education entries.');
  return `<div class="entry-list">${list.map(ed => {
    const date = srDateRange(ed.startDate, ed.endDate, ed.current);
    const bullets = (ed.description || '').split('\n').map(s => s.trim()).filter(Boolean);
    return `<div class="entry-card"><div class="entry-top"><div>
        <div class="entry-title">${srEscapeHtml(ed.degree || '')}${ed.field ? ' · ' + srEscapeHtml(ed.field) : ''}</div>
        ${ed.school ? `<div class="entry-org">${srEscapeHtml(ed.school)}</div>` : ''}
      </div><div class="entry-meta">
        ${date ? `<span>${srEscapeHtml(date)}</span>` : ''}
        ${ed.location ? `<span>${srEscapeHtml(ed.location)}</span>` : ''}
      </div></div>
      ${bullets.length ? `<ul class="entry-bullets">${bullets.map(b => `<li>${srEscapeHtml(b)}</li>`).join('')}</ul>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function srRenderExperience(list) {
  if (!list || !list.length) return srEmptyNote('No experience entries.');
  return `<div class="entry-list">${list.map(e => {
    const date = srDateRange(e.startDate, e.endDate, e.current);
    const bullets = (e.description || '').split('\n').map(s => s.trim()).filter(Boolean);
    return `<div class="entry-card"><div class="entry-top"><div>
        <div class="entry-title">${srEscapeHtml(e.role || '')}</div>
        ${e.company ? `<div class="entry-org">${srEscapeHtml(e.company)}</div>` : ''}
      </div><div class="entry-meta">
        ${date ? `<span>${srEscapeHtml(date)}</span>` : ''}
        ${e.location ? `<span>${srEscapeHtml(e.location)}</span>` : ''}
      </div></div>
      ${bullets.length ? `<ul class="entry-bullets">${bullets.map(b => `<li>${srEscapeHtml(b)}</li>`).join('')}</ul>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function srCountForTab(key, resume) {
  switch (key) {
    case 'summary': return resume.summary ? 1 : 0;
    case 'skills': return (resume.skills || []).length;
    case 'certifications': return (resume.certifications || []).length;
    case 'education': return (resume.education || []).length;
    case 'experience': return (resume.experience || []).length;
    default: return 0;
  }
}

function viewSavedResume(id, resume) {
  const detail = document.getElementById('savedResumeDetail');
  if (!resume) { detail.innerHTML = ''; return; }
  const p = resume.personal || {};
  const { score, missing } = srCalcCompletion(resume);
  const tabs = ['summary', 'skills', 'certifications', 'education', 'experience'];
  const labels = { summary: 'Summary', skills: 'Skills', certifications: 'Certifications', education: 'Education', experience: 'Experience' };

  const panelContent = {
    summary: resume.summary ? `<p class="prose">${srEscapeHtml(resume.summary)}</p>` : srEmptyNote('No summary provided.'),
    skills: srRenderSkills(resume.skills),
    certifications: srRenderCertifications(resume.certifications),
    education: srRenderEducation(resume.education),
    experience: srRenderExperience(resume.experience)
  };

  detail.innerHTML = `
    <div class="sr-detail">
      <div class="masthead">
        <div>
          <div class="out-name">${srEscapeHtml(p.name || resume.title || '—')}</div>
          <div class="contact-chips">
            ${[p.email, p.phone, p.location, p.linkedin, p.portfolio].filter(Boolean).map(v => `<span class="chip">${srEscapeHtml(v)}</span>`).join('') || '<span class="chip">No contact details</span>'}
          </div>
        </div>
        <div class="confidence">
          <div class="conf-ring-wrap">
            ${srConfidenceRingSVG(score)}
            <div class="conf-center"><span>${score}</span><small>%</small></div>
          </div>
          <div class="conf-caption">
            <div class="conf-label">Profile completeness</div>
            <div class="conf-missing">${missing.length ? 'Not detected: ' + missing.join(', ') : 'All core fields detected.'}</div>
          </div>
        </div>
      </div>

      <div class="tabs">
        ${tabs.map((t, i) => `<button class="tab-btn${i === 0 ? ' active' : ''}" data-key="${t}">${labels[t]} <span class="n">${srCountForTab(t, resume)}</span></button>`).join('')}
      </div>
      <div class="tab-panels">
        ${tabs.map((t, i) => `<div class="panel${i === 0 ? ' active' : ''}" data-key="${t}">${panelContent[t]}</div>`).join('')}
      </div>
    </div>`;

  detail.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      detail.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      detail.querySelectorAll('.panel').forEach(pn => pn.classList.remove('active'));
      btn.classList.add('active');
      detail.querySelector(`.panel[data-key="${btn.dataset.key}"]`).classList.add('active');
    });
  });
}

(async function init() {
  await requireSession();
  loadSavedResumes();
})();
</script>
</body>
</html>
