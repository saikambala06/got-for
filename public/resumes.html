<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetMeApply - Resumes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <div class="app-layout" id="app">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="topbar-container"></div>
      <div class="page-content">
        <h1 class="page-title">Resumes</h1>
        <p class="page-subtitle">Manage your resumes for job applications</p>

        <div class="resume-layout">
          <div class="resume-list-panel">
            <div class="resume-list-header">
              <span style="font-size: 15px; font-weight: 600;">My Resumes</span>
              <button class="btn btn-primary btn-sm" onclick="createResume()">+ New Resume</button>
            </div>
            <div id="resume-list">
              <div class="empty-state">
                <div class="empty-state-title">No resumes yet</div>
                <div class="empty-state-text">Click "New Resume" to get started</div>
              </div>
            </div>
          </div>

          <div class="resume-form-panel">
            <div class="resume-form-header">
              <span style="font-size: 16px; font-weight: 600;" id="resume-form-title">Select or create a resume</span>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-outline btn-sm" onclick="downloadResume()" id="download-btn" style="display: none;">Download</button>
                <button class="btn btn-primary btn-sm" onclick="saveResume()" id="save-btn" style="display: none;">Save Changes</button>
              </div>
            </div>
            <div class="resume-form-body" id="resume-form-body">
              <div class="empty-state">
                <div class="empty-state-title">No resume selected</div>
                <div class="empty-state-text">Select a resume from the left or create a new one</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/common.js"></script>
  <script>
    if (!checkAuth()) throw new Error('Not authenticated');

    document.getElementById('sidebar-container').innerHTML = getSidebarHTML('resumes');
    document.getElementById('topbar-container').innerHTML = getTopbarHTML();
    loadPlanInfo();

    let resumes = [];
    let currentResume = null;

    async function loadResumes() {
      try {
        const data = await apiCall('/resumes');
        if (data) {
          resumes = data.resumes;
          renderResumeList();
        }
      } catch (err) {
        showToast('Failed to load resumes', 'error');
      }
    }

    function renderResumeList() {
      const listEl = document.getElementById('resume-list');
      if (resumes.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No resumes yet</div>
            <div class="empty-state-text">Click "New Resume" to get started</div>
          </div>
        `;
        return;
      }

      listEl.innerHTML = resumes.map(r => `
        <div class="resume-item ${currentResume && currentResume._id === r._id ? 'active' : ''}" onclick="selectResume('${r._id}')">
          <div class="resume-item-title">${r.title || 'Untitled Resume'}</div>
          <div class="resume-item-date">Updated ${formatDate(r.updatedAt)}</div>
        </div>
      `).join('');
    }

    function selectResume(id) {
      currentResume = resumes.find(r => r._id === id);
      renderResumeList();
      renderForm();
    }

    function renderForm() {
      if (!currentResume) {
        document.getElementById('resume-form-title').textContent = 'Select or create a resume';
        document.getElementById('save-btn').style.display = 'none';
        document.getElementById('download-btn').style.display = 'none';
        document.getElementById('resume-form-body').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No resume selected</div>
            <div class="empty-state-text">Select a resume from the left or create a new one</div>
          </div>
        `;
        return;
      }

      document.getElementById('resume-form-title').textContent = currentResume.title || 'Untitled Resume';
      document.getElementById('save-btn').style.display = 'inline-flex';
      document.getElementById('download-btn').style.display = 'inline-flex';

      const pi = currentResume.personalInfo || {};
      document.getElementById('resume-form-body').innerHTML = `
        <div class="section-title">Personal Information</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-input" id="pi-name" value="${pi.name || ''}" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="pi-email" value="${pi.email || ''}" placeholder="you@example.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="text" class="form-input" id="pi-phone" value="${pi.phone || ''}" placeholder="+1 (555) 000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" class="form-input" id="pi-location" value="${pi.location || ''}" placeholder="City, State">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">LinkedIn URL</label>
            <input type="text" class="form-input" id="pi-linkedin" value="${pi.linkedin || ''}" placeholder="linkedin.com/in/username">
          </div>
          <div class="form-group">
            <label class="form-label">Portfolio URL</label>
            <input type="text" class="form-input" id="pi-portfolio" value="${pi.portfolio || ''}" placeholder="yourportfolio.com">
          </div>
        </div>

        <div class="section-title" style="margin-top: 24px;">Summary</div>
        <div class="form-group">
          <textarea class="form-textarea" id="resume-summary" placeholder="Write a brief summary about yourself...">${currentResume.summary || ''}</textarea>
        </div>

        <div class="section-title" style="margin-top: 24px;">Skills</div>
        <div class="form-group">
          <input type="text" class="form-input" id="resume-skills" value="${(currentResume.skills || []).join(', ')}" placeholder="Comma-separated skills (e.g. JavaScript, React, Node.js)">
        </div>
      `;
    }

    async function createResume() {
      try {
        const data = await apiCall('/resumes', {
          method: 'POST',
          body: JSON.stringify({ title: 'New Resume' })
        });
        if (data) {
          resumes.unshift(data.resume);
          currentResume = data.resume;
          renderResumeList();
          renderForm();
          showToast('Resume created');
        }
      } catch (err) {
        showToast('Failed to create resume', 'error');
      }
    }

    async function saveResume() {
      if (!currentResume) return;

      const update = {
        title: document.getElementById('resume-form-title').textContent,
        personalInfo: {
          name: document.getElementById('pi-name').value,
          email: document.getElementById('pi-email').value,
          phone: document.getElementById('pi-phone').value,
          location: document.getElementById('pi-location').value,
          linkedin: document.getElementById('pi-linkedin').value,
          portfolio: document.getElementById('pi-portfolio').value
        },
        summary: document.getElementById('resume-summary').value,
        skills: document.getElementById('resume-skills').value.split(',').map(s => s.trim()).filter(Boolean)
      };

      try {
        const data = await apiCall(`/resumes/${currentResume._id}`, {
          method: 'PUT',
          body: JSON.stringify(update)
        });
        if (data) {
          const idx = resumes.findIndex(r => r._id === currentResume._id);
          resumes[idx] = data.resume;
          currentResume = data.resume;
          renderResumeList();
          showToast('Resume saved');
        }
      } catch (err) {
        showToast('Failed to save resume', 'error');
      }
    }

    function downloadResume() {
      if (!currentResume) return;
      const pi = currentResume.personalInfo || {};
      let content = `${pi.name || ''}\n${pi.email || ''} | ${pi.phone || ''} | ${pi.location || ''}\n`;
      if (pi.linkedin) content += `LinkedIn: ${pi.linkedin}\n`;
      if (pi.portfolio) content += `Portfolio: ${pi.portfolio}\n`;
      content += `\nSUMMARY\n${currentResume.summary || ''}\n`;
      if (currentResume.skills && currentResume.skills.length) {
        content += `\nSKILLS\n${currentResume.skills.join(', ')}\n`;
      }
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(currentResume.title || 'resume').replace(/\s+/g, '_')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    loadResumes();
  </script>
</body>
</html>
