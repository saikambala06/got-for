<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resumes — SK VK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css" />
<style>
  .rt-tabs{ display:flex; gap:6px; margin-bottom:22px; border-bottom:1px solid var(--border); }
  .rt-tab{
    padding:11px 18px; font-size:13.5px; font-weight:600; color:var(--text-faint);
    border:none; background:none; cursor:pointer; border-bottom:2px solid transparent;
    position:relative; top:1px; font-family:var(--font-body);
  }
  .rt-tab.active{ color:var(--accent-2); border-bottom-color:var(--accent); }
  .rt-panel{ display:none; }
  .rt-panel.active{ display:block; }

  .rt-textarea{
    width:100%; min-height:170px; border-radius:var(--radius-sm); border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); padding:16px; font-size:13px; line-height:1.65;
    font-family:'JetBrains Mono', monospace; resize:vertical;
  }
  .rt-textarea:focus{ outline:none; border-color:var(--accent); }

  .rt-actions{ display:flex; align-items:center; gap:12px; margin-top:16px; }
  .rt-hint{ font-size:12.5px; color:var(--text-faint); margin-bottom:14px; }
  .rt-error{
    margin-top:16px; padding:13px 16px; border-radius:var(--radius-sm);
    background:rgba(255,107,129,0.1); border:1px solid rgba(255,107,129,0.3); color:#ffd2da; font-size:13px;
  }

  .loader-sm{
    width:13px; height:13px; border-radius:50%; border:2px solid var(--border);
    border-top-color:var(--accent); display:inline-block; animation:rt-spin .7s linear infinite;
  }
  @keyframes rt-spin{ to{ transform:rotate(360deg); } }

  /* dossier */
  .dossier{ display:grid; grid-template-columns:200px 1fr; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-top:26px; }
  .dossier .dtabs{ background:var(--bg-soft); border-right:1px solid var(--border); padding:14px 0; }
  .dossier .dtabs button{
    display:block; width:100%; text-align:left; padding:11px 18px; border:none; background:none;
    font-size:13px; color:var(--text-faint); cursor:pointer; border-left:2px solid transparent; font-family:var(--font-body);
  }
  .dossier .dtabs button.active{ color:var(--text); font-weight:600; background:var(--surface); border-left-color:var(--accent); }
  .dossier .dcontent{ padding:26px 30px; background:var(--surface); }
  .field-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin-bottom:5px; }
  .field-value{ font-size:14.5px; margin-bottom:18px; line-height:1.6; }
  .skill-chip{
    display:inline-block; background:var(--accent-soft); color:var(--accent-2); font-size:12.5px; padding:4px 11px;
    border-radius:100px; margin:0 6px 6px 0; font-family:'JetBrains Mono', monospace;
  }
  .exp-entry{ border-left:2px solid var(--border); padding-left:16px; margin-bottom:20px; }
  .exp-entry .role{ font-weight:700; font-size:14.5px; }
  .exp-entry .org{ color:var(--text-faint); font-size:12.5px; margin-bottom:6px; }
  .exp-entry ul{ margin:0; padding-left:18px; font-size:13px; line-height:1.65; color:var(--text-dim); }

  /* match gauge */
  .gauge-wrap{ display:flex; align-items:center; gap:26px; padding:20px 0 6px; }
  .gauge{ position:relative; width:104px; height:104px; flex-shrink:0; }
  .gauge svg{ transform:rotate(-90deg); }
  .gauge .num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:26px; font-weight:700; }
  .gauge-label{ font-size:13px; color:var(--text-dim); line-height:1.6; }

  .kw-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .kw-present{ background:rgba(54,211,153,0.12); color:var(--green); }
  .kw-missing{ background:rgba(255,107,129,0.12); color:var(--red); }

  .rt-block{ margin-top:30px; }
  .rt-block h3{
    font-size:12.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint);
    font-weight:700; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:10px;
  }
  .rt-box{
    background:var(--surface-2); border-radius:var(--radius-sm); padding:16px 18px;
    font-size:13.5px; line-height:1.7; white-space:pre-wrap; color:var(--text);
  }

  .job-pick{
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:13px 16px; margin-bottom:10px; cursor:pointer;
    background:var(--surface-2); transition:.15s ease;
  }
  .job-pick:hover{ border-color:var(--accent); }
  .job-pick .role{ font-weight:700; font-size:13.5px; }
  .job-pick .co{ font-size:12px; color:var(--text-faint); }

  .resume-card{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:10px;
    background:var(--surface-2); cursor:pointer; transition:.15s ease;
  }
  .resume-card:hover{ border-color:var(--accent); }
  .resume-card .rc-title{ font-weight:700; font-size:14px; }
  .resume-card .rc-meta{ font-size:12px; color:var(--text-faint); margin-top:2px; }
  .resume-card .rc-badge{
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-2);
    background:var(--accent-soft); padding:3px 9px; border-radius:100px; margin-left:8px;
  }
  .resume-card .rc-actions{ display:flex; gap:8px; flex-shrink:0; }
  .resume-card .rc-actions button{ position:relative; z-index:2; }

  .row-2{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
  @media (max-width:820px){ .row-2{ grid-template-columns:1fr; } .dossier{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-root" data-active="resumes"></div>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Resumes</div>
        <div class="page-sub">Resumes you've parsed and saved. Click one to view its details.</div>
      </div>
      <a href="/parse-resume.html" class="btn btn-primary">+ Parse a resume</a>
    </div>

    <div class="card section-card">
      <div id="savedResumesList"></div>
      <div id="savedResumeDetail"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
/* ---- saved resumes ---- */
async function loadSavedResumes() {
  const list = document.getElementById('savedResumesList');
  document.getElementById('savedResumeDetail').innerHTML = '';
  list.innerHTML = '<div class="rt-hint"><span class="loader-sm"></span> Loading your resumes…</div>';
  try {
    const { resumes } = await api.get('/api/resumes');
    if (!resumes.length) {
      list.innerHTML = `<div class="rt-hint">No saved resumes yet. <a href="/parse-resume.html" style="color:var(--accent-2)">Parse a resume</a> to add one.</div>`;
      return;
    }
    list.innerHTML = resumes.map(r => `
      <div class="resume-card" data-view="${r._id}">
        <div>
          <div class="rc-title">${r.title}${r.isDefault ? '<span class="rc-badge">Default</span>' : ''}</div>
          <div class="rc-meta">${(r.skills || []).length} skills · updated ${timeAgo(r.updatedAt)}</div>
        </div>
        <div class="rc-actions">
          <button class="btn" data-view-btn="${r._id}">View</button>
          <button class="btn" data-delete="${r._id}">Delete</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-view], [data-view-btn]').forEach(el => {
      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = el.dataset.view || el.dataset.viewBtn;
        viewSavedResume(id, resumes.find(r => r._id === id));
      });
    });
    list.querySelectorAll('[data-delete]').forEach(el => {
      el.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (!confirm('Delete this resume? This cannot be undone.')) return;
        try {
          await api.del('/api/resumes/' + el.dataset.delete);
          showToast('Resume deleted');
          loadSavedResumes();
        } catch (err) {
          showToast(err.message || 'Could not delete resume', 'error');
        }
      });
    });
  } catch (err) {
    list.innerHTML = `<div class="rt-error">${err.message || 'Could not load resumes'}</div>`;
  }
}

function viewSavedResume(id, resume) {
  const detail = document.getElementById('savedResumeDetail');
  if (!resume) { detail.innerHTML = ''; return; }
  const p = resume.personal || {};
  detail.innerHTML = `
    <div class="dossier">
      <div class="dtabs">
        <button class="active">Summary</button>
        <button data-exp>Experience</button>
        <button data-edu>Education</button>
      </div>
      <div class="dcontent">
        <div class="field-label">Name</div><div class="field-value">${p.name || '—'}</div>
        <div class="field-label">Contact</div><div class="field-value">${p.email || '—'}${p.phone ? ' · ' + p.phone : ''}</div>
        <div class="field-label">Summary</div><div class="field-value">${resume.summary || '—'}</div>
        <div class="field-label">Skills</div>
        <div>${(resume.skills || []).map(s => `<span class="skill-chip">${s}</span>`).join('') || '—'}</div>
      </div>
    </div>`;

  const dtabs = detail.querySelector('.dtabs');
  dtabs.querySelectorAll('button').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      dtabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const content = detail.querySelector('.dcontent');
      if (i === 0) {
        content.innerHTML = `
          <div class="field-label">Name</div><div class="field-value">${p.name || '—'}</div>
          <div class="field-label">Contact</div><div class="field-value">${p.email || '—'}${p.phone ? ' · ' + p.phone : ''}</div>
          <div class="field-label">Summary</div><div class="field-value">${resume.summary || '—'}</div>
          <div class="field-label">Skills</div>
          <div>${(resume.skills || []).map(s => `<span class="skill-chip">${s}</span>`).join('') || '—'}</div>`;
      } else if (i === 1) {
        content.innerHTML = (resume.experience || []).map(e => `
          <div class="exp-entry">
            <div class="role">${e.role || ''}</div>
            <div class="org">${e.company || ''}${e.startDate ? ' · ' + e.startDate + (e.endDate ? ' – ' + e.endDate : '') : ''}</div>
            <ul>${(e.description || '').split('\n').filter(Boolean).map(b => `<li>${b}</li>`).join('')}</ul>
          </div>`).join('') || '<div class="rt-hint">No experience entries.</div>';
      } else {
        content.innerHTML = (resume.education || []).map(ed => `
          <div class="exp-entry">
            <div class="role">${ed.degree || ''}</div>
            <div class="org">${ed.school || ''}${ed.startDate ? ' · ' + ed.startDate + (ed.endDate ? ' – ' + ed.endDate : '') : ''}</div>
          </div>`).join('') || '<div class="rt-hint">No education entries.</div>';
      }
    });
  });
}

(async function init() {
  await requireSession();
  loadSavedResumes();
})();
</script>
</body>
</html>
