<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetMeApply - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout" id="app">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="topbar-container"></div>
      <div class="page-content">
        <h1 class="page-title">Dashboards</h1>
        <p class="page-subtitle">Track your job application activity</p>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">All Time</div>
            <div class="stat-value" id="stat-alltime">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Monthly</div>
            <div class="stat-value" id="stat-monthly">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Last 7 Days</div>
            <div class="stat-value" id="stat-week">0</div>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-header">
            <div class="chart-title">Application Trends</div>
            <div style="display: flex; align-items: center; gap: 16px;">
              <div class="chart-legend">
                <div class="legend-item">
                  <div class="legend-dot" style="background: #22c55e;"></div>
                  <span>Jobs Applied</span>
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background: #f59e0b;"></div>
                  <span>Jobs Viewed</span>
                </div>
              </div>
              <select class="form-select" id="period-select" style="width: auto; padding: 6px 10px; font-size: 13px;">
                <option value="weekly">Weekly</option>
                <option value="monthly" selected>Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="trend-chart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/common.js"></script>
  <script>
    if (!checkAuth()) throw new Error('Not authenticated');

    document.getElementById('sidebar-container').innerHTML = getSidebarHTML('dashboard');
    document.getElementById('topbar-container').innerHTML = getTopbarHTML();
    loadPlanInfo();

    let trendChart = null;

    async function loadStats() {
      const period = document.getElementById('period-select').value;
      try {
        const data = await apiCall(`/dashboard/stats?period=${period}`);
        if (!data) return;

        document.getElementById('stat-alltime').textContent = data.allTimeCount || 0;
        document.getElementById('stat-monthly').textContent = data.monthlyCount || 0;
        document.getElementById('stat-week').textContent = data.weekCount || 0;

        renderChart(data.trendData || []);
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    function renderChart(trendData) {
      const ctx = document.getElementById('trend-chart').getContext('2d');

      const labels = trendData.map(d => d.label);
      const appliedData = trendData.map(d => d.jobsApplied);
      const viewedData = trendData.map(d => d.jobsViewed);

      if (trendChart) {
        trendChart.destroy();
      }

      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Jobs Applied',
              data: appliedData,
              borderColor: '#22c55e',
              backgroundColor: 'rgba(34, 197, 94, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 5,
              pointHoverRadius: 7,
              pointBackgroundColor: '#22c55e',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              borderWidth: 2
            },
            {
              label: 'Jobs Viewed',
              data: viewedData,
              borderColor: '#f59e0b',
              backgroundColor: 'rgba(245, 158, 11, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 5,
              pointHoverRadius: 7,
              pointBackgroundColor: '#f59e0b',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              borderWidth: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              backgroundColor: '#18181b',
              padding: 12,
              cornerRadius: 8,
              titleFont: { size: 13, weight: '600' },
              bodyFont: { size: 13 }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#a1a1aa', font: { size: 12 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#f4f4f5' },
              ticks: { color: '#a1a1aa', font: { size: 12 } }
            }
          },
          interaction: {
            mode: 'index',
            intersect: false
          }
        }
      });
    }

    document.getElementById('period-select').addEventListener('change', loadStats);

    loadStats();
  </script>
</body>
</html>
