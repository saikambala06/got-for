<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Tracker — SK VK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css" />
<style>
  .tracker-layout{ display:grid; grid-template-columns: 1.1fr 1fr; gap:18px; align-items:start; }
  .filter-bar{ display:flex; gap:10px; margin-bottom:16px; align-items:flex-start; position:relative; }
  .search-box{ position:relative; max-width:340px; }
  .search-box input{ width:100%; padding-right:34px; }
  .search-box svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none; }
  .search-box input{ padding-left:32px; }
  .filter-btn{
    width:38px; height:38px; flex-shrink:0; border-radius:9px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .filter-btn:hover{ border-color:var(--accent); color:var(--accent-2); }
  .filter-btn.active{ border-color:var(--accent); color:var(--accent-2); }
  .install-ext-btn{
    display:inline-flex; align-items:center; gap:7px; padding:8px 16px; border-radius:9px; border:none;
    background:#1ea672; color:#fff; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .install-ext-btn:hover{ filter:brightness(1.06); }
  .filter-popover{
    position:absolute; top:46px; left:0; z-index:60; background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:18px; width:300px; box-shadow:0 14px 38px rgba(0,0,0,0.35); display:none;
  }
  .filter-popover.open{ display:block; }
  .filter-popover h4{ display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:14px; }
  .filter-popover .close-x{ margin-left:auto; cursor:pointer; color:var(--text-faint); background:none; border:none; }
  .date-presets{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .date-preset{ padding:7px 12px; border-radius:9px; border:1px solid var(--border); font-size:12.5px; color:var(--text-dim); cursor:pointer; background:var(--surface-2); }
  .date-preset.active{ border-color:var(--accent); color:var(--accent-2); background:var(--accent-soft); }
  .date-range-row{ display:flex; gap:10px; margin-bottom:14px; }
  .date-range-row .field{ flex:1; }
  .date-range-row label{ font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; }
  .filter-popover-footer{ display:flex; justify-content:space-between; align-items:center; }
  .filter-popover-footer .link-btn{ background:none; border:none; color:var(--text-dim); font-size:13px; cursor:pointer; }
  .filter-popover-footer .link-btn:hover{ color:var(--text); }
  .job-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-radius:11px; cursor:pointer;
    border:1px solid transparent; margin-bottom:6px; transition: all .12s ease;
  }
  .job-row:hover{ background: var(--surface-2); }
  .job-row.active{ background: var(--accent-soft); border-color: rgba(255,154,77,0.3); }
  .job-row .jr-icon{
    width:36px;height:36px;border-radius:9px;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--text-dim);flex-shrink:0;
  }
  .star-btn{ background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px; }
  .star-btn.fav{ color: var(--accent); }
  .detail-empty{ display:flex; align-items:center; justify-content:center; min-height:380px; }
  .kv-row{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
  .kv-row span:first-child{ color:var(--text-dim); }
  .skill-chip{ display:inline-block; background:var(--surface-2); border:1px solid var(--border); padding:4px 10px; border-radius:100px; font-size:11.5px; margin:0 6px 6px 0; color:var(--text-dim); }
  .modal-backdrop{ position:fixed; inset:0; background:rgba(7,9,18,0.7); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .modal-backdrop.open{ display:flex; }
  .modal{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:26px; width:100%; max-width:560px; max-height:90vh; overflow:auto; }
  .modal h3{ margin-bottom:18px; }
  .status-tabs{ display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; }
  .status-tab{ padding:8px 14px; border-radius:100px; font-size:12.5px; font-weight:600; white-space:nowrap; cursor:pointer; border:1px solid var(--border); color:var(--text-dim); }
  .status-tab.active{ background:var(--accent); color:#1a1326; border-color:var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-root" data-active="tracker"></div>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Job Tracker</div>
        <div class="page-sub">Every application, organized in one place.</div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="install-ext-btn" id="installExtBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Install Extension
        </button>
        <button class="btn btn-primary" id="openAddModal">+ Add application</button>
      </div>
    </div>

    <div class="grid cards-row" id="summaryCards" style="grid-template-columns:repeat(5,1fr);"></div>

    <div class="filter-bar">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by title, company, or location…" />
      </div>
      <button class="filter-btn" id="filterToggleBtn" title="Filter by applied date">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
      <div class="filter-popover" id="filterPopover">
        <h4>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Filter by applied date
          <button class="close-x" id="closeFilterBtn">✕</button>
        </h4>
        <div class="date-presets" id="datePresets">
          <div class="date-preset" data-preset="7">Last 7 days</div>
          <div class="date-preset" data-preset="30">Last 30 days</div>
          <div class="date-preset" data-preset="90">Last 90 days</div>
        </div>
        <div class="date-range-row">
          <div class="field"><label>Start date</label><input type="date" id="filterStart" /></div>
          <div class="field"><label>End date</label><input type="date" id="filterEnd" /></div>
        </div>
        <div class="filter-popover-footer">
          <button class="link-btn" id="clearFilterBtn">Clear</button>
          <button class="btn btn-primary btn-sm" id="applyFilterBtn">Apply</button>
        </div>
      </div>
    </div>
    <div class="status-tabs" id="statusTabs"></div>

    <div class="tracker-layout">
      <div class="card" style="padding:10px;">
        <div id="jobList"></div>
      </div>
      <div class="card" id="detailPanel">
        <div class="detail-empty">
          <div class="empty-state">
            <div class="icon">👆</div>
            <h4>Select an application</h4>
            <p>Click any row to view full details here.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">Add application</h3>
    <form id="jobForm">
      <input type="hidden" id="jobId" />
      <div class="form-grid">
        <div class="field"><label>Job title*</label><input id="fTitle" required placeholder="Software Engineer" /></div>
        <div class="field"><label>Company*</label><input id="fCompany" required placeholder="Acme Inc." /></div>
        <div class="field"><label>Location</label><input id="fLocation" placeholder="Remote / New York, NY" /></div>
        <div class="field"><label>Salary range</label><input id="fSalary" placeholder="$120,000 – $150,000" /></div>
        <div class="field"><label>Status</label>
          <select id="fStatus">
            <option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option><option>Archived</option>
          </select>
        </div>
        <div class="field"><label>Source</label><input id="fSource" placeholder="LinkedIn, referral, etc." /></div>
        <div class="field"><label>Job posting URL</label><input id="fUrl" placeholder="https://…" /></div>
        <div class="field"><label>Applied on</label><input type="date" id="fDate" /></div>
      </div>
      <div class="field" style="margin-top:16px;"><label>Skills required (comma separated)</label><input id="fSkills" placeholder="Python, AWS, SQL" /></div>
      <div class="field" style="margin-top:16px;"><label>Notes</label><textarea id="fNotes" placeholder="Anything worth remembering…"></textarea></div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:22px;">
        <button type="button" class="btn btn-ghost" id="cancelModal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveJobBtn">Save application</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
let allJobs = [];
let selectedId = null;
let activeStatus = 'All';
let dateFilter = { start: '', end: '' };
const STATUSES = ['All', 'Applied', 'Interviewing', 'Offer', 'Rejected', 'Archived'];

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderStatusTabs() {
  document.getElementById('statusTabs').innerHTML = STATUSES.map((s) =>
    `<div class="status-tab ${s === activeStatus ? 'active' : ''}" data-status="${s}">${s}</div>`
  ).join('');
  document.querySelectorAll('.status-tab').forEach((t) => {
    t.addEventListener('click', () => { activeStatus = t.dataset.status; loadJobs(); });
  });
}

function renderSummary(jobs) {
  const counts = { Applied: 0, Interviewing: 0, Offer: 0, Rejected: 0, Archived: 0 };
  jobs.forEach((j) => counts[j.status] = (counts[j.status] || 0) + 1);
  const order = ['Applied', 'Interviewing', 'Offer', 'Rejected', 'Archived'];
  document.getElementById('summaryCards').innerHTML = order.map((s) => `
    <div class="card stat-card">
      <div class="stat-label">${s}</div>
      <div class="stat-value" style="font-size:26px;">${counts[s] || 0}</div>
    </div>`).join('');
}

function renderJobList() {
  const listEl = document.getElementById('jobList');
  if (!allJobs.length) {
    listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h4>No applications found</h4><p>Try a different filter or add a new one.</p></div>`;
    return;
  }
  listEl.innerHTML = allJobs.map((j) => `
    <div class="job-row ${j._id === selectedId ? 'active' : ''}" data-id="${j._id}">
      <div style="display:flex;align-items:center;gap:12px;min-width:0;">
        <div class="jr-icon">${escapeHtml(j.company).slice(0,2).toUpperCase()}</div>
        <div style="min-width:0;">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(j.title)}</div>
          <div style="font-size:12.5px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(j.company)}${j.location ? ' · ' + escapeHtml(j.location) : ''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <span class="pill pill-${j.status}"><span class="pill-dot"></span>${j.status}</span>
        <button class="star-btn ${j.favorite ? 'fav' : ''}" data-fav="${j._id}" title="Favorite">★</button>
      </div>
    </div>`).join('');

  listEl.querySelectorAll('.job-row').forEach((row) => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.star-btn')) return;
      selectedId = row.dataset.id;
      renderJobList();
      renderDetail();
    });
  });
  listEl.querySelectorAll('[data-fav]').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.fav;
      const job = allJobs.find((j) => j._id === id);
      try {
        await api.put(`/api/jobs/${id}`, { favorite: !job.favorite });
        loadJobs();
      } catch (err) { showToast(err.message, 'error'); }
    });
  });
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  const job = allJobs.find((j) => j._id === selectedId);
  if (!job) {
    panel.innerHTML = `<div class="detail-empty"><div class="empty-state"><div class="icon">👆</div><h4>Select an application</h4><p>Click any row to view full details here.</p></div></div>`;
    return;
  }
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
      <div>
        <h3 style="font-size:19px;">${escapeHtml(job.title)}</h3>
        <p style="color:var(--text-dim);font-size:13.5px;margin-top:4px;">${escapeHtml(job.company)}${job.location ? ' · ' + escapeHtml(job.location) : ''}</p>
      </div>
      <span class="pill pill-${job.status}"><span class="pill-dot"></span>${job.status}</span>
    </div>
    <div class="kv-row"><span>Applied on</span><span>${new Date(job.appliedOn).toLocaleDateString(undefined,{ year:'numeric', month:'short', day:'numeric'})}</span></div>
    ${job.salary ? `<div class="kv-row"><span>Salary</span><span>${escapeHtml(job.salary)}</span></div>` : ''}
    ${job.source ? `<div class="kv-row"><span>Source</span><span>${escapeHtml(job.source)}</span></div>` : ''}
    ${job.jobUrl ? `<div class="kv-row"><span>Posting</span><span><a href="${escapeHtml(job.jobUrl)}" target="_blank" style="color:var(--accent-2)">View original →</a></span></div>` : ''}
    ${job.skills && job.skills.length ? `<div style="margin-top:16px;"><div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">SKILLS</div>${job.skills.map(s=>`<span class="skill-chip">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
    ${job.notes ? `<div style="margin-top:16px;"><div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">NOTES</div><p style="font-size:13.5px;line-height:1.6;color:var(--text);">${escapeHtml(job.notes)}</p></div>` : ''}
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button class="btn btn-sm" id="editJobBtn">Edit</button>
      <button class="btn btn-sm btn-danger" id="deleteJobBtn">Delete</button>
    </div>
  `;
  document.getElementById('editJobBtn').addEventListener('click', () => openModal(job));
  document.getElementById('deleteJobBtn').addEventListener('click', async () => {
    if (!confirm('Delete this application? This cannot be undone.')) return;
    try {
      await api.del(`/api/jobs/${job._id}`);
      selectedId = null;
      showToast('Application deleted');
      loadJobs();
    } catch (err) { showToast(err.message, 'error'); }
  });
}

async function loadJobs() {
  renderStatusTabs();
  const q = document.getElementById('searchInput').value.trim();
  try {
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (activeStatus !== 'All') params.set('status', activeStatus);
    if (dateFilter.start) params.set('startDate', dateFilter.start);
    if (dateFilter.end) params.set('endDate', dateFilter.end);
    const { jobs } = await api.get(`/api/jobs?${params.toString()}`);
    allJobs = jobs;
    if (!jobs.find((j) => j._id === selectedId)) selectedId = null;
    renderSummary(jobs);
    renderJobList();
    renderDetail();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadJobs, 300);
});

// Filter-by-date popover
const filterPopover = document.getElementById('filterPopover');
const filterToggleBtn = document.getElementById('filterToggleBtn');
filterToggleBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  filterPopover.classList.toggle('open');
});
document.getElementById('closeFilterBtn').addEventListener('click', () => filterPopover.classList.remove('open'));
document.addEventListener('click', (e) => {
  if (!filterPopover.contains(e.target) && e.target !== filterToggleBtn && !filterToggleBtn.contains(e.target)) {
    filterPopover.classList.remove('open');
  }
});
document.querySelectorAll('.date-preset').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.date-preset').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    const days = Number(btn.dataset.preset);
    const end = new Date();
    const start = new Date(end.getTime() - days * 24 * 60 * 60 * 1000);
    document.getElementById('filterStart').value = start.toISOString().slice(0, 10);
    document.getElementById('filterEnd').value = end.toISOString().slice(0, 10);
  });
});
document.getElementById('applyFilterBtn').addEventListener('click', () => {
  dateFilter.start = document.getElementById('filterStart').value;
  dateFilter.end = document.getElementById('filterEnd').value;
  filterToggleBtn.classList.toggle('active', !!(dateFilter.start || dateFilter.end));
  filterPopover.classList.remove('open');
  loadJobs();
});
document.getElementById('clearFilterBtn').addEventListener('click', () => {
  dateFilter.start = ''; dateFilter.end = '';
  document.getElementById('filterStart').value = '';
  document.getElementById('filterEnd').value = '';
  document.querySelectorAll('.date-preset').forEach((b) => b.classList.remove('active'));
  filterToggleBtn.classList.remove('active');
  loadJobs();
});

// Install Extension — no extension is published yet, so let people know
// rather than linking to a dead store listing.
document.getElementById('installExtBtn').addEventListener('click', () => {
  showToast("The SK VK browser extension isn't available yet — stay tuned!");
});

// Modal logic
const backdrop = document.getElementById('modalBackdrop');
function openModal(job) {
  document.getElementById('modalTitle').textContent = job ? 'Edit application' : 'Add application';
  document.getElementById('jobId').value = job ? job._id : '';
  document.getElementById('fTitle').value = job ? job.title : '';
  document.getElementById('fCompany').value = job ? job.company : '';
  document.getElementById('fLocation').value = job ? job.location : '';
  document.getElementById('fSalary').value = job ? job.salary : '';
  document.getElementById('fStatus').value = job ? job.status : 'Applied';
  document.getElementById('fSource').value = job ? job.source : '';
  document.getElementById('fUrl').value = job ? job.jobUrl : '';
  document.getElementById('fSkills').value = job && job.skills ? job.skills.join(', ') : '';
  document.getElementById('fNotes').value = job ? job.notes : '';
  document.getElementById('fDate').value = job ? new Date(job.appliedOn).toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
  backdrop.classList.add('open');
}
function closeModal() { backdrop.classList.remove('open'); }
document.getElementById('openAddModal').addEventListener('click', () => openModal(null));
document.getElementById('cancelModal').addEventListener('click', closeModal);
backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveJobBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const id = document.getElementById('jobId').value;
  const payload = {
    title: document.getElementById('fTitle').value.trim(),
    company: document.getElementById('fCompany').value.trim(),
    location: document.getElementById('fLocation').value.trim(),
    salary: document.getElementById('fSalary').value.trim(),
    status: document.getElementById('fStatus').value,
    source: document.getElementById('fSource').value.trim(),
    jobUrl: document.getElementById('fUrl').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    skills: document.getElementById('fSkills').value.split(',').map(s=>s.trim()).filter(Boolean),
    appliedOn: document.getElementById('fDate').value
  };
  try {
    if (id) {
      await api.put(`/api/jobs/${id}`, payload);
      showToast('Application updated');
    } else {
      const { job } = await api.post('/api/jobs', payload);
      selectedId = job._id;
      showToast('Application added');
    }
    closeModal();
    loadJobs();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Save application';
  }
});

(async function init() {
  await requireSession();
  loadJobs();
})();
</script>
</body>
</html>
