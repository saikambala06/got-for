<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Review &amp; edit — SK VK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css" />
<style>
  .rv-controlbar{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
  .rv-sheet{ background:#fff; color:#1a1d29; border-radius:12px; padding:34px 40px; max-width:720px; margin:0 auto; }
  .rv-sheet h1{ text-align:center; font-size:21px; margin:0 0 4px; color:#1a1d29; }
  .rv-sheet .rv-contact{ text-align:center; font-size:12px; color:#6b7280; margin-bottom:16px; }
  .rv-hr{ border:none; border-top:1px solid #e4e6ec; margin:14px 0; }
  .rv-heading{ font-size:12.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#1a1d29; margin:18px 0 8px; }
  .rv-diff-old{ font-size:13px; line-height:1.55; color:#9aa0ab; text-decoration:line-through; background:#fdf2f2; padding:4px 8px; border-radius:6px; margin-bottom:2px; }
  .rv-diff-row{ display:flex; align-items:flex-start; gap:8px; background:#fffbe6; border-radius:6px; padding:4px 8px; }
  .rv-diff-new{ font-size:13px; line-height:1.55; color:#1a1d29; flex:1; }
  .rv-diff-new.added::before{ content:'+ '; color:#16a34a; font-weight:700; }
  .rv-act{ width:22px; height:22px; border-radius:6px; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:700; }
  .rv-act.yes{ background:#dcfce7; color:#16a34a; }
  .rv-act.no{ background:#fee2e2; color:#dc2626; }
  .rv-act.active{ outline:2px solid currentColor; }
  .rv-plain{ font-size:13px; line-height:1.55; color:#1a1d29; padding:3px 8px; }
  .rv-removed-note{ font-size:11px; color:#9aa0ab; font-style:italic; margin:2px 0 6px 8px; }
  .rv-skill-tag{ display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid #d9dce4; margin:3px 4px 3px 0; color:#1a1d29; }
  .rv-skill-tag.added{ background:#fffbe6; border-color:#f5d90a; }
  .rv-bottombar{ display:flex; align-items:center; gap:14px; margin-top:20px; flex-wrap:wrap; }
  .rv-score-copy{ font-size:12.5px; color:var(--text-dim); }
  .rv-score-copy b{ color:var(--green); }
</style>
</head>
<body>
<div class="app">
  <div id="sidebar-root" data-active="resumes"></div>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Review &amp; edit</div>
        <div class="page-sub" id="jobSub">Review every AI suggestion before downloading.</div>
      </div>
      <a href="/tailor-resume.html" class="btn btn-sm">← Back</a>
    </div>

    <div class="rv-controlbar">
      <span style="font-size:12.5px;color:var(--text-dim);font-weight:600;">Tailoring level</span>
      <div class="seg-group" id="levelGroup" style="width:220px;">
        <button class="seg-btn" data-level="low">Low</button>
        <button class="seg-btn active" data-level="medium">Med</button>
        <button class="seg-btn" data-level="high">High</button>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-sm" id="resetBtn">Reset changes</button>
      <button class="btn btn-sm" id="applyAllBtn">Apply all changes</button>
      <button class="btn btn-primary btn-sm" id="downloadBtn">Download resume →</button>
    </div>

    <div class="card section-card" id="sheetMount">
      <div style="text-align:center;padding:60px 0;color:var(--text-dim);"><span class="loader"></span><div style="margin-top:8px;">Matching it against the job…</div></div>
    </div>
  </main>
</div>

<!-- Download drawer -->
<div class="modal-backdrop" id="drawerBackdrop" style="display:none;">
  <div class="modal-card" style="width:440px;">
    <h1 style="font-size:19px;">Download your resume</h1>
    <p class="sub">Choose a template and format for the tailored version.</p>
    <div class="field-block">
      <label>Template</label>
      <select id="d_template"><option>Classic</option><option>Harvard</option><option>Jake's</option><option>Modern</option><option>Minimal</option></select>
    </div>
    <div class="field-block">
      <label>Accent color</label>
      <div class="swatch-row" id="d_accents"></div>
    </div>
    <div class="field-block">
      <label>Format</label>
      <div class="seg-group" id="d_format">
        <button class="seg-btn active" data-format="pdf">PDF</button>
        <button class="seg-btn" data-format="docx">DOCX</button>
      </div>
    </div>
    <button class="continue-btn" id="d_go">↓ Download PDF</button>
    <button class="cancel-link" id="d_cancel">Cancel</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
const ACCENTS = ['#2563eb', '#16a34a', '#0ea5a4', '#dc2626', '#ec4899', '#d946ef', '#ea580c', '#f59e0b', '#0f172a', '#7c3aed'];
const params = new URLSearchParams(location.search);
const resumeId = params.get('resumeId');
const jobId = params.get('jobId') || '';

let resume = null, job = null, diff = null, decisions = {}, tailoringLevel = 'medium';
let dAccent = ACCENTS[1], dTemplate = 'Classic', dFormat = 'pdf';

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function init() {
  await requireSession();
  if (!resumeId) { document.getElementById('sheetMount').innerHTML = '<div class="empty-state">No resume selected. <a href="/tailor-resume.html" style="color:var(--accent-2)">Go back</a>.</div>'; return; }

  try { const r = await api.get(`/api/resumes/${resumeId}`); resume = r.resume; } catch (err) { showToast(err.message, 'error'); return; }

  if (jobId) {
    try {
      const { job: j } = await api.get(`/api/jobs/${jobId}`);
      job = j;
      document.getElementById('jobSub').textContent = `Tailoring against ${job.title} at ${job.company}.`;
    } catch (err) { /* optional */ }
  }

  document.getElementById('levelGroup').addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn'); if (!btn) return;
    if (btn.dataset.level === tailoringLevel) return;
    tailoringLevel = btn.dataset.level;
    document.getElementById('levelGroup').querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    fetchDiff();
  });
  document.getElementById('resetBtn').addEventListener('click', () => { decisions = {}; render(); });
  document.getElementById('applyAllBtn').addEventListener('click', () => {
    decisions = { summary: true };
    diff.experience.forEach(r => r.bullets.forEach((b, bi) => { decisions[`exp:${r.index}:${bi}`] = true; }));
    render();
  });
  document.getElementById('downloadBtn').addEventListener('click', openDrawer);

  renderSwatchRow(document.getElementById('d_accents'), ACCENTS, dAccent, (c) => { dAccent = c; });
  document.getElementById('d_format').addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn'); if (!btn) return;
    dFormat = btn.dataset.format;
    document.getElementById('d_format').querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('d_go').textContent = dFormat === 'pdf' ? '↓ Download PDF' : '↓ Download DOCX';
  });
  document.getElementById('d_template').addEventListener('change', (e) => { dTemplate = e.target.value; });
  document.getElementById('d_cancel').addEventListener('click', () => { document.getElementById('drawerBackdrop').style.display = 'none'; });
  document.getElementById('d_go').addEventListener('click', () => {
    document.getElementById('drawerBackdrop').style.display = 'none';
    downloadResume(projected(), { format: dFormat, accent: dAccent, template: dTemplate });
  });

  fetchDiff();
}

function renderSwatchRow(container, colors, selected, onPick) {
  container.innerHTML = colors.map(c => `<span class="swatch ${c === selected ? 'selected' : ''}" data-color="${c}" style="background:${c}"></span>`).join('');
  container.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      container.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      onPick(sw.dataset.color);
    });
  });
}

function synthesizedJobDescription() {
  if (!job) return 'General role — tailor for clarity, impact, and strong action verbs.';
  if (job.description && job.description.trim()) return job.description.trim();
  return `${job.title} at ${job.company}. ${(job.skills || []).length ? 'Key skills: ' + job.skills.join(', ') + '. ' : ''}${job.notes || ''}`.trim();
}

async function fetchDiff() {
  document.getElementById('sheetMount').innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--text-dim);"><span class="loader"></span><div style="margin-top:8px;">Matching it against the job…</div></div>';
  try {
    const { tailored } = await api.post(`/api/resumes/${resumeId}/tailor`, {
      jobTitle: job ? job.title : '',
      jobDescription: synthesizedJobDescription(),
      tailoringLevel
    });
    diff = tailored;
    decisions = {};
    render();
  } catch (err) {
    document.getElementById('sheetMount').innerHTML = `<div style="color:var(--red);padding:20px;">Tailoring failed: ${esc(err.message)}</div>`;
  }
}

function projected() {
  const summary = decisions.summary !== false ? diff.summary.new : diff.summary.old;
  const skills = diff.skills;
  const experience = diff.experience.map((role) => {
    const original = resume.experience[role.index] || {};
    const lines = [];
    role.bullets.forEach((b, bi) => {
      const key = `exp:${role.index}:${bi}`;
      const accepted = decisions[key] !== false;
      if (b.action === 'remove') { if (!accepted) lines.push(b.old); return; }
      if (b.action === 'keep') { lines.push(b.new); return; }
      lines.push(accepted ? b.new : (b.old || b.new));
    });
    return { ...original, description: lines.join('\n') };
  });
  return { ...resume, summary, skills, experience };
}

function render() {
  const p = resume.personal || {};
  const summaryChanged = diff.summary.old.trim() !== diff.summary.new.trim();
  const sumAccepted = decisions.summary !== false;
  const summaryHtml = !summaryChanged ? `<div class="rv-plain">${esc(diff.summary.new)}</div>` : `
    <div>
      ${sumAccepted ? `<div class="rv-diff-old">${esc(diff.summary.old)}</div>` : ''}
      <div class="rv-diff-row">
        <div class="rv-diff-new">${esc(sumAccepted ? diff.summary.new : diff.summary.old)}</div>
        <div style="display:flex;gap:4px;">
          <button class="rv-act yes ${sumAccepted ? 'active' : ''}" data-kind="summary" data-value="true">✓</button>
          <button class="rv-act no ${!sumAccepted ? 'active' : ''}" data-kind="summary" data-value="false">✗</button>
        </div>
      </div>
    </div>`;

  const originalSkills = new Set((resume.skills || []).map(s => s.toLowerCase()));
  const skillsHtml = diff.skills.map(s => `<span class="rv-skill-tag ${!originalSkills.has(s.toLowerCase()) ? 'added' : ''}">${esc(s)}</span>`).join('');

  const expHtml = diff.experience.map((role) => {
    const bulletsHtml = role.bullets.map((b, bi) => {
      const key = `exp:${role.index}:${bi}`;
      const accepted = decisions[key] !== false;
      if (b.action === 'keep') return `<div class="rv-plain">${esc(b.new)}</div>`;
      if (b.action === 'remove') {
        return accepted
          ? `<div class="rv-diff-old">${esc(b.old)}</div><div class="rv-removed-note">Suggested removal <button class="rv-act no active" style="display:inline-flex;margin-left:6px;" data-kind="${key}" data-value="false">✗ keep</button></div>`
          : `<div class="rv-plain">${esc(b.old)} <button class="rv-act yes" style="display:inline-flex;margin-left:6px;" data-kind="${key}" data-value="true">✓ remove</button></div>`;
      }
      return `<div>
        ${accepted && b.old ? `<div class="rv-diff-old">${esc(b.old)}</div>` : ''}
        <div class="rv-diff-row">
          <div class="rv-diff-new ${b.action === 'add' ? 'added' : ''}">${esc(accepted ? b.new : (b.old || b.new))}</div>
          <div style="display:flex;gap:4px;">
            <button class="rv-act yes ${accepted ? 'active' : ''}" data-kind="${key}" data-value="true">✓</button>
            <button class="rv-act no ${!accepted ? 'active' : ''}" data-kind="${key}" data-value="false">✗</button>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="rv-heading" style="margin-bottom:2px;">${esc(role.role)}</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">${esc(role.company)}</div>${bulletsHtml}`;
  }).join('<hr class="rv-hr"/>');

  document.getElementById('sheetMount').innerHTML = `
    <div class="rv-sheet">
      <h1>${esc(p.name || 'Your Name')}</h1>
      <div class="rv-contact">${[p.email, p.phone, p.location, p.linkedin].filter(Boolean).map(esc).join(' | ')}</div>
      <hr class="rv-hr"/>
      <div class="rv-heading">Summary</div>${summaryHtml}
      <div class="rv-heading">Skills</div><div>${skillsHtml}</div>
      <div class="rv-heading">Experience</div>${expHtml}
    </div>`;

  document.querySelectorAll('[data-kind]').forEach(btn => {
    btn.addEventListener('click', () => { decisions[btn.dataset.kind] = btn.dataset.value === 'true'; render(); });
  });
}

function openDrawer() { document.getElementById('drawerBackdrop').style.display = 'flex'; }

function downloadResume(resumeData, opts) {
  const html = resumeToExportHtml(resumeData, opts);
  if (opts.format === 'docx') {
    const wrapped = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>${html}</html>`;
    const blob = new Blob(['\ufeff', wrapped], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${(resumeData.personal?.name || 'resume').replace(/\s+/g, '_')}.doc`;
    a.click();
    URL.revokeObjectURL(a.href);
  } else {
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 300);
  }
  showToast('Resume ready — check your downloads');
}

function resumeToExportHtml(resume, opts) {
  const p = resume.personal || {};
  const accent = opts.accent || '#16a34a';
  const contact = [p.email, p.phone, p.location, p.linkedin].filter(Boolean).map(esc).join(' &nbsp;|&nbsp; ');
  const skillsHtml = (resume.skills || []).map(esc).join(', ');
  const expHtml = (resume.experience || []).map(e => `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-weight:700;"><span>${esc(e.role || '')}</span><span>${esc(e.dates || '')}</span></div>
      <div style="font-style:italic;color:#444;margin-bottom:4px;">${esc(e.company || '')}</div>
      <ul style="margin:0;padding-left:18px;">${(e.description || '').split('\n').filter(Boolean).map(l => `<li>${esc(l.replace(/^[-•*]\s*/, ''))}</li>`).join('')}</ul>
    </div>`).join('');
  const eduHtml = (resume.education || []).map(ed => `<div style="margin-bottom:8px;"><strong>${esc(ed.school || '')}</strong> — ${esc(ed.degree || '')} ${esc(ed.field || '')}</div>`).join('');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>${esc(p.name || 'Resume')}</title>
    <style>
      body{ font-family: Georgia, 'Times New Roman', serif; color:#111; padding:40px; max-width:760px; margin:0 auto; }
      h1{ text-align:center; margin-bottom:2px; } .contact{ text-align:center; font-size:12px; color:#555; margin-bottom:18px; }
      h2{ font-size:13px; text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid ${accent}; padding-bottom:3px; margin-top:22px; }
      @media print { body{ padding:0; } }
    </style></head><body>
    <h1>${esc(p.name || '')}</h1><div class="contact">${contact}</div>
    <h2>Summary</h2><p>${esc(resume.summary || '')}</p>
    <h2>Skills</h2><p>${skillsHtml}</p>
    <h2>Experience</h2>${expHtml}
    <h2>Education</h2>${eduHtml}
    </body></html>`;
}

init();
</script>
</body>
</html>
